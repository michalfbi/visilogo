    <script>
      // SUPER AGGRESSIVE OVERLAY KILLER
      // This forces the removal of the React Error Overlay (iframe) 
      // which is showing the Talisman extension error.
      setInterval(function() {
        // 1. Try to hide/remove the iframe by selector
        var iframes = document.querySelectorAll('iframe');
        iframes.forEach(function(iframe) {
          // React Overlay usually has no ID, but we can guess by style or lack of src
          if (iframe.style.zIndex === '2147483647' || iframe.style.position === 'fixed') {
             iframe.style.display = 'none';
             iframe.remove(); 
          }
        });
        
        // 2. Clear console errors visually if possible (cannot clear user console, but can intercept)
      }, 100);

      // 3. Global Error interception (retry)
      window.onerror = function(message, source, lineno, colno, error) {
        if (message && typeof message === 'string' && (message.includes('Talisman') || message.includes('Extension'))) {
          return true; // Prevents the firing of the default event handler
        }
      };
      
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && event.reason.message && (event.reason.message.includes('Talisman') || event.reason.message.includes('Extension'))) {
          event.preventDefault();
        }
      });
    </script>
    <script>
      // AGGRESSIVE ERROR SUPPRESSION FOR EXTENSIONS
      // Blocks "Talisman" and other extension errors from triggering the Red Overlay
      (function() {
        var originalError = console.error;
        console.error = function() {
          var args = Array.from(arguments);
          if (args.some(function(arg) {
            return typeof arg === 'string' && (
              arg.includes('Talisman') || 
              arg.includes('Extension context invalidated') ||
              arg.includes('ResizeObserver loop limit')
            );
          })) {
             return;
          }
          originalError.apply(console, args);
        };
        
        window.addEventListener('error', function(e) {
          if (e.message && (e.message.includes('Talisman') || e.message.includes('Extension context'))) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
      })();
    </script>
    <style>
      /* Hide the CRA Error Overlay iframe aggressively */
      iframe[style*="z-index: 2147483647"] {
         display: none !important;
         pointer-events: none !important;
         visibility: hidden !important;
      }
    </style>
